<div class="kl-page-header" style="align-items:center;">
  <p class="kl-fg-3" style="font-size:13px; margin:0;">Payments made to suppliers.</p>
  <button class="kl-btn kl-btn-primary" (click)="openAdd()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
      stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    Record Payment
  </button>
</div>

<kl-card>
  <kl-grid
    [columns]="columns"
    [inputdata]="payments()"
    [loading]="paymentsResource.isLoading()"
    [pageIndex]="pageIndex()"
    [showSearch]="false"
    emptyMessage="No payments recorded."
    (pageChange)="onPageChange($event)"
    (rowClick)="onRowClick($event)">
  </kl-grid>
</kl-card>

<!-- Payment Add Drawer -->
<app-payment-add [open]="drawerOpen()" [paymentId]="paymentIdForEdit()" (close)="drawerOpen.set(false)" (saved)="onDrawerSaved()" />
