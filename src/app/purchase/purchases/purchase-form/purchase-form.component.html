<div class="kl-page-header" style="align-items:center;">
  <a routerLink="/purchase/purchases" class="kl-link" style="font-size:13px;">Back to Purchases</a>
</div>

@if (error()) {
  <div style="padding:12px 16px; background:#FEF2F2; border:1px solid #FECACA; border-radius:6px; color:#991B1B; font-size:13px; margin-bottom:16px;">
    {{ error() }}
  </div>
}

<kl-card>
  <div style="font-weight:600; font-size:14px; margin-bottom:16px; color:#1A2B1C;">Purchase Details</div>
  <div class="kl-form">
    <div class="kl-form-row">
      <div class="kl-form-group" style="position:relative;">
        <label class="kl-label">Supplier <span style="color:#DC2626;">*</span></label>
        @if (suppliersLoading()) {
          <div class="animate-pulse bg-bg-muted rounded h-9 w-full"></div>
        } @else {
          <select class="kl-select" name="supplierId" [value]="supplierId()" (change)="supplierId.set($any($event.target).value)">
            <option value="" disabled>Select supplier...</option>
            @for (s of suppliers(); track s.id) {
              <option [value]="s.id">{{ s.name }}</option>
            }
          </select>
        }
      </div>

      <div class="kl-form-group">
        <label class="kl-label">Store <span style="color:#DC2626;">*</span></label>
        <select class="kl-select" [value]="storeId()" (change)="storeId.set($any($event.target).value)">
          <option value="">Select store...</option>
          @for (s of storePicker.stores(); track s.id) {
            <option [value]="s.id">{{ s.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="kl-form-row">
      <div class="kl-form-group">
        <label class="kl-label">Purchase Date <span style="color:#DC2626;">*</span></label>
        <input class="kl-input" type="date" [value]="purchaseDate()" (change)="purchaseDate.set($any($event.target).value)" />
      </div>
      <div class="kl-form-group">
        <label class="kl-label">Notes</label>
        <input class="kl-input" [value]="notes()" (input)="notes.set($any($event.target).value)" placeholder="Optional notes for this purchase" />
      </div>
    </div>

    <div style="display:flex; justify-content:flex-end; padding-top:8px; border-top:1px solid #E5E7EB;">
      <button class="kl-btn kl-btn-primary" [disabled]="saving()" (click)="createDraft()">
        {{ saving() ? 'Saving...' : 'Create Draft' }}
      </button>
    </div>
  </div>
</kl-card>
