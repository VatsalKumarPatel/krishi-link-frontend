<div class="kl-page-header" style="align-items:center;">
  <p class="kl-fg-3" style="font-size:13px; margin:0;">Purchase orders and goods receipt notes.</p>
  <a routerLink="/purchase/purchases/new" class="kl-btn kl-btn-primary">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
      stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    New Purchase
  </a>
</div>

<!-- Quick tabs -->
<div class="kl-tabs" style="margin-bottom:16px;">
  <button class="kl-tab" [class.is-active]="activeTab() === 'all'" (click)="setTab('all')">All</button>
  <button class="kl-tab" [class.is-active]="activeTab() === 'pending'" (click)="setTab('pending')">Pending Payment</button>
  <button class="kl-tab" [class.is-active]="activeTab() === 'overdue'" (click)="setTab('overdue')">Overdue</button>
</div>

<kl-card>
  @if (activeTab() === 'all') {
    <div class="kl-toolbar" style="flex-wrap:wrap; gap:10px; padding:12px 16px; border-bottom:1px solid var(--kl-border);">
      <select class="kl-select" (change)="setStatus($any($event.target).value)">
        @for (opt of statusOptions; track opt.label) {
          <option [value]="opt.value ?? ''">{{ opt.label }}</option>
        }
      </select>
      <input class="kl-input" type="date" style="width:160px;"
        [value]="fromDate()" (change)="setFromDate($any($event.target).value)" />
      <input class="kl-input" type="date" style="width:160px;"
        [value]="toDate()" (change)="setToDate($any($event.target).value)" />
    </div>
  }

  <kl-grid
    [columns]="columns"
    [inputdata]="purchases()"
    [loading]="purchasesResource.isLoading()"
    [pageIndex]="pageIndex()"
    [showSearch]="false"
    emptyMessage="No purchases found."
    (pageChange)="onPageChange($event)"
    (rowClick)="onRowClick($event)">
  </kl-grid>
</kl-card>
