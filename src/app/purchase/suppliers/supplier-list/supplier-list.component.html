<!-- Header -->
<div class="kl-page-header" style="align-items:center;">
  <p class="kl-fg-3" style="font-size:13px; margin:0;">Manage the suppliers you purchase from.</p>
  <div style="display:flex; gap:8px;">
    <button class="kl-btn kl-btn-secondary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Export CSV
    </button>
    <button class="kl-btn kl-btn-primary" (click)="openAdd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add supplier
    </button>
  </div>
</div>

<kl-card>
  <!-- Active/Inactive filter alongside kl-grid's built-in search -->
  <div style="display:flex; gap:6px;" card-actions>
    <button class="kl-btn kl-btn-secondary" [class.is-active]="isActiveFilter() === undefined" (click)="setFilter(undefined)">All</button>
    <button class="kl-btn kl-btn-secondary" [class.is-active]="isActiveFilter() === true" (click)="setFilter(true)">Active</button>
    <button class="kl-btn kl-btn-secondary" [class.is-active]="isActiveFilter() === false" (click)="setFilter(false)">Inactive</button>
  </div>

  <kl-grid
    [columns]="columns"
    [inputdata]="suppliers()"
    [loading]="suppliersResource.isLoading()"
    [pageIndex]="pageIndex()"
    [showActions]="true"
    [searchValue]="query()"
    searchPlaceholder="Search by name or code…"
    emptyMessage="No suppliers match the current filters."
    (searchChange)="onSearch($event)"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (rowClick)="onRowClick($event)"
    (editClick)="openEdit($event)">
  </kl-grid>
</kl-card>

<!-- Deactivate confirm dialog -->
@if (confirmDeactivateId()) {
  <div class="kl-overlay" (click)="cancelDeactivate()">
    <div class="kl-dialog" (click)="$event.stopPropagation()">
      <div class="kl-dialog-head">Deactivate Supplier</div>
      <p style="font-size:13px; color:#374151; margin:0 0 20px;">
        This supplier will be marked inactive and hidden from new purchase forms. Existing records are unaffected.
      </p>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="kl-btn kl-btn-secondary" (click)="cancelDeactivate()">Cancel</button>
        <button class="kl-btn kl-btn-danger" [disabled]="deactivating()" (click)="confirmDeactivate()">
          {{ deactivating() ? 'Deactivating…' : 'Deactivate' }}
        </button>
      </div>
    </div>
  </div>
}
