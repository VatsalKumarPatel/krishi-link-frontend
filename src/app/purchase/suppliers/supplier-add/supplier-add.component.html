<kl-drawer
  [open]="open"
  [title]="title"
  [subtitle]="subtitle"
  (close)="close.emit()">

  @if (loading()) {
    <div style="padding:40px; text-align:center; color:#6B7A6E;">Loading…</div>
  } @else {

    <div class="kl-form">

      <!-- Supplier Details -->
      <div class="kl-form-section">Supplier Details</div>
      <div class="full">
        <label class="kl-form-label">Supplier Name <span style="color:#C0392B;">*</span></label>
        <input class="kl-input" [(ngModel)]="form.name" name="name" maxlength="200" placeholder="e.g. Agro Chemicals Pvt Ltd" />
      </div>
      <div>
        <label class="kl-form-label">Supplier Code <span style="color:#C0392B;">*</span></label>
        <input class="kl-input" [value]="form.code" (input)="onCodeInput($any($event.target).value)"
          name="code" maxlength="20" style="text-transform:uppercase;" placeholder="e.g. AGCHEM" />
      </div>
      <div>
        <label class="kl-form-label">Contact Person</label>
        <input class="kl-input" [(ngModel)]="form.contactPerson" name="contactPerson" maxlength="100" placeholder="e.g. Ramesh Sharma" />
      </div>
      <div>
        <label class="kl-form-label">Phone Number</label>
        <input class="kl-input" [(ngModel)]="form.phoneNumber" name="phoneNumber" type="tel" placeholder="+91 98765 43210" />
      </div>
      <div>
        <label class="kl-form-label">Email</label>
        <input class="kl-input" [(ngModel)]="form.email" name="email" type="email" placeholder="supplier@example.com" />
      </div>
      <div>
        <label class="kl-form-label">GSTIN</label>
        <input class="kl-input" [(ngModel)]="form.gstin" name="gstin" maxlength="15" placeholder="27AABCU9603R1ZX" />
      </div>
      <div class="full">
        <label class="kl-form-label">Address</label>
        <textarea class="kl-input" [(ngModel)]="form.address" name="address" rows="3" placeholder="Registered address"></textarea>
      </div>

      <!-- Financial Terms -->
      <div class="kl-form-section">Financial Terms</div>
      <div>
        <label class="kl-form-label">Credit Limit from Supplier (₹)</label>
        <input class="kl-input" [(ngModel)]="form.creditLimitFromSupplier" name="creditLimitFromSupplier" type="number" min="0" step="0.01" />
      </div>
      <div>
        <label class="kl-form-label">Payment Terms (Days)</label>
        <input class="kl-input" [(ngModel)]="form.paymentTermsDays" name="paymentTermsDays" type="number" min="0" />
        <span class="kl-form-hint">Used to pre-fill due date on purchases</span>
      </div>

      <!-- Status (edit only) -->
      @if (isEdit) {
        <div class="kl-form-section">Status</div>
        <div class="full">
          <label class="kl-form-label">Account status</label>
          <select class="kl-select" [(ngModel)]="form.isActive" name="isActive">
            <option [ngValue]="true">Active</option>
            <option [ngValue]="false">Inactive</option>
          </select>
        </div>
      }

      <!-- Error -->
      @if (saveError) {
        <div class="full" style="background:#FEF2F2; border:1px solid #FECACA; border-radius:8px; padding:10px 14px; color:#991B1B; font-size:13px;">
          {{ saveError }}
        </div>
      }

    </div>
  }

  <ng-container drawer-actions>
    <button class="kl-btn kl-btn-secondary" (click)="close.emit()" [disabled]="saving">Cancel</button>
    <button class="kl-btn kl-btn-primary" (click)="submit()" [disabled]="saving || loading()">
      @if (saving) { Saving… } @else { {{ isEdit ? 'Save changes' : 'Create supplier' }} }
    </button>
  </ng-container>

</kl-drawer>
