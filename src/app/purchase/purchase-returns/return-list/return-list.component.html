<div class="kl-page-header" style="align-items:center;">
  <p class="kl-fg-3" style="font-size:13px; margin:0;">Debit notes sent back to suppliers.</p>
  <a routerLink="/purchase/purchase-returns/new" class="kl-btn kl-btn-primary">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
      stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    New Return
  </a>
</div>

<kl-card>
  <kl-grid
    [columns]="columns"
    [inputdata]="returns()"
    [loading]="returnsResource.isLoading()"
    [pageIndex]="pageIndex()"
    [showSearch]="false"
    emptyMessage="No returns found."
    (pageChange)="onPageChange($event)"
    (rowClick)="onRowClick($event)">
  </kl-grid>
</kl-card>
