<div class="kl-page-header" style="align-items:center;">
  <p class="kl-fg-3" style="font-size:13px; margin:0;">Batch and expiry tracking for inventory.</p>
</div>

<kl-card>
  <div class="kl-toolbar" style="flex-wrap:wrap; gap:10px; padding:12px 16px; border-bottom:1px solid var(--kl-border);">
    <label class="kl-toggle-label">
      <input type="checkbox" [checked]="showExpired()"
        (change)="toggleExpired($any($event.target).checked)" />
      <span>Show Expired</span>
    </label>
    <label class="kl-toggle-label">
      <input type="checkbox" [checked]="showDepleted()"
        (change)="toggleDepleted($any($event.target).checked)" />
      <span>Show Depleted</span>
    </label>
    <div style="margin-left:auto; display:flex; gap:16px; font-size:12px; color:#6B7A6E;">
      <span style="color:#991B1B;">■ Expired</span>
      <span style="color:#92400E;">■ Expiring within 30 days</span>
    </div>
  </div>

  <kl-grid
    [columns]="columns"
    [inputdata]="batches()"
    [loading]="batchesResource.isLoading()"
    [pageIndex]="pageIndex()"
    [showSearch]="false"
    emptyMessage="No batches found."
    (pageChange)="onPageChange($event)"
    (rowClick)="onRowClick($event)">
  </kl-grid>
</kl-card>
