<div class="login-wrap">
  <div class="login-box">

    <!-- Alert -->
    @if (error()) {
      <kl-alert variant="danger" [message]="error()" class="block mb-4" />
    }

    <!-- Card -->
    <div class="login-card">
      
    <!-- Brand -->
    <div class="login-brand">
      <div class="login-logo">
        <svg width="36" height="36" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="#E6F2E3"/>
          <path d="M16 8c0 0-2 3-2 7s2 7 2 7 2-3 2-7-2-7-2-7z" fill="#2F7D3B"/>
          <path d="M10 14c0 0 2.5-.5 4.5 1s3 4 3 4-2.5.5-4.5-1-3-4-3-4z" fill="#3C9A4A"/>
          <path d="M22 14c0 0-2.5-.5-4.5 1s-3 4-3 4 2.5.5 4.5-1 3-4 3-4z" fill="#3C9A4A"/>
        </svg>
        <span class="login-brand-name">Krishilink</span>
      </div>
      <p class="login-brand-tagline">Soil to sale · Admin console</p>
    </div>

      <h1 class="login-heading">Sign in</h1>
      <p class="login-sub">Enter your credentials to continue.</p>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="kl-form-group mb-4">
          <label class="kl-form-label" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="kl-input"
            placeholder="you@example.com"
            [(ngModel)]="credentials.email"
            name="email"
            required
            autocomplete="email"
          />
        </div>

        <div class="kl-form-group mb-5">
          <label class="kl-form-label" for="password">Password</label>
          <input
            id="password"
            type="password"
            class="kl-input"
            placeholder="••••••••"
            [(ngModel)]="credentials.password"
            name="password"
            required
            autocomplete="current-password"
          />
        </div>

        <div class="flex items-center justify-between mb-5">
          <label class="login-remember">
            <input type="checkbox" [(ngModel)]="credentials.rememberMe" name="rememberMe" class="login-checkbox" />
            Remember me
          </label>
          <a href="#" class="login-forgot">
            Forgot password?
          </a>
        </div>

        <button
          type="submit"
          class="kl-btn kl-btn-primary login-submit"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="animate-spin">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
            Signing in…
          } @else {
            Sign in
          }
        </button>
      </form>

      <div class="login-footer">
        Don't have an account? <a href="#">Contact your administrator</a>
      </div>
    </div>

  </div>
</div>
