<!-- Header -->
<div class="kl-page-header" style="align-items:center;">
  <div>
    <p class="kl-fg-3" style="font-size:13px; margin:0;">
      Priority-ranked list of farmers with outstanding dues. Click a farmer to view details.
    </p>
    <div style="display:flex; gap:16px; margin-top:8px; font-size:13px; color:#6B7A6E;">
      <span>Total outstanding: <strong style="color:#C0392B;">₹{{ totalOutstanding() | number:'1.0-0' }}</strong></span>
      <span>·</span>
      <span><strong style="color:#C0392B;">{{ overdueCount() }}</strong> farmers overdue 30+ days</span>
    </div>
  </div>
  <div style="display:flex; gap:8px;">
    <a routerLink="/collections/targets" class="kl-btn kl-btn-secondary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      </svg>
      View Targets
    </a>
  </div>
</div>

<!-- Filters -->
<div style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;">
  <select class="kl-select" style="width:auto; min-width:160px;"
    [value]="outstandingFilter()"
    (change)="outstandingFilter.set($any($event.target).value)">
    <option value="">All amounts</option>
    <option value="0-5000">₹0 – ₹5,000</option>
    <option value="5000-25000">₹5,000 – ₹25,000</option>
    <option value="25000">₹25,000+</option>
  </select>

  <select class="kl-select" style="width:auto; min-width:160px;"
    [value]="daysOverdueFilter()"
    (change)="daysOverdueFilter.set($any($event.target).value)">
    <option value="">All ages</option>
    <option value="30">30+ days overdue</option>
    <option value="60">60+ days overdue</option>
    <option value="90">90+ days overdue</option>
  </select>

  <select class="kl-select" style="width:auto; min-width:160px;"
    [value]="harvestFilter()"
    (change)="harvestFilter.set($any($event.target).value)">
    <option value="">All harvest months</option>
    @for (m of harvestMonths; track m) {
      <option [value]="m">{{ m }}</option>
    }
  </select>
</div>

<!-- Queue table -->
<kl-card>
  <kl-grid
    [columns]="columns"
    [inputdata]="queue()"
    [loading]="false"
    [pageIndex]="pageIndex()"
    [searchValue]="query()"
    searchPlaceholder="Search by farmer name or code…"
    [setSearch]="setSearch"
    [setPage]="setPage"
    [setSort]="setSort"
    (rowClick)="onRowClick($event)">
  </kl-grid>
</kl-card>
