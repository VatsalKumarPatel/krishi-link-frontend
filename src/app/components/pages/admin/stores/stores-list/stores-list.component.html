@if (!embedded()) {
  <div class="kl-page-header" style="align-items:center;">
    <p class="kl-fg-3" style="font-size:13px; margin:0;">Manage warehouses and collection centres across all tenants.</p>
    <div style="display:flex; gap:8px;">
      <button class="kl-btn kl-btn-secondary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export CSV
      </button>
      <button class="kl-btn kl-btn-primary" (click)="openAdd()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Add store
      </button>
    </div>
  </div>
}

<kl-card>
  @if (embedded()) {
    <button class="kl-btn kl-btn-primary" card-actions (click)="openAdd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add store
    </button>
  }

  <kl-grid
    [columns]="columns()"
    [inputdata]="stores()"
    [loading]="storesResource.isLoading()"
    [pageIndex]="pageIndex()"
    [showActions]="true"
    [searchValue]="query()"
    searchPlaceholder="Search by name, code, or location…"
    (searchChange)="onSearch($event)"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (rowClick)="onRowClick($event)"
    (editClick)="openEdit($event)">
  </kl-grid>
</kl-card>

<app-store-add
  [open]="drawerOpen()"
  [store]="editStore()"
  [defaultTenantId]="tenantId()"
  (close)="closeDrawer()"
  (saved)="closeDrawer(true)" />
