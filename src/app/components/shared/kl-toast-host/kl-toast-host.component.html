<div class="kl-toast-host" aria-live="polite" aria-atomic="true">
  @for (t of toastService.toasts(); track t.id) {
    <div class="kl-toast" [class]="'kl-toast kl-toast-' + t.kind" role="status">

      <span class="kl-toast-ico">
        @switch (t.kind) {
          @case ('success') {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
          }
          @case ('error') {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>
            </svg>
          }
          @case ('warning') {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/>
            </svg>
          }
          @default {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
            </svg>
          }
        }
      </span>

      <div class="kl-toast-body">
        @if (t.title) { <div class="kl-toast-title">{{ t.title }}</div> }
        @if (t.message) { <div class="kl-toast-msg">{{ t.message }}</div> }
      </div>

      <button class="kl-toast-close" type="button" (click)="toastService.dismiss(t.id)" aria-label="Dismiss">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>

    </div>
  }
</div>
