<div class="kl-overlay" [class.is-open]="open" (click)="closed.emit()">
  <div class="kl-modal" (click)="$event.stopPropagation()">
    <div class="kl-dlg-head">
      <div>
        <div class="kl-dlg-title">{{ title }}</div>
        @if (subtitle) { <div class="kl-dlg-sub">{{ subtitle }}</div> }
      </div>
      <button class="kl-dlg-close" (click)="closed.emit()" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="kl-dlg-body">
      <ng-content />
    </div>
    <div class="kl-dlg-foot">
      <ng-content select="[modal-footer]" />
    </div>
  </div>
</div>
