<div class="kl-page-header" style="align-items:center;">
  <div style="display:flex; align-items:center; gap:10px;">
    <select class="kl-select" style="font-size:12px; padding:5px 8px; width:auto;"
      [value]="modeFilter()" (change)="modeFilter.set($any($event.target).value)">
      <option value="">All Modes</option>
      @for (m of modes; track m) { <option [value]="m">{{ m }}</option> }
    </select>
    <select class="kl-select" style="font-size:12px; padding:5px 8px; width:auto;"
      [value]="statusFilter()" (change)="statusFilter.set($any($event.target).value)">
      <option value="">All Statuses</option>
      @for (s of statuses; track s) { <option [value]="s">{{ s }}</option> }
    </select>
  </div>
  <a routerLink="/sales/payments/new" class="kl-btn kl-btn-primary">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    Record Payment
  </a>
</div>

<kl-card>
  <kl-grid
    [columns]="columns"
    [inputdata]="paymentsData()"
    [loading]="false"
    [pageIndex]="pageIndex()"
    [showSearch]="true"
    [setSearch]="setSearch"
    [setPage]="setPage"
    emptyMessage="No payments recorded."
    (rowClick)="onRowClick($event)">
  </kl-grid>
</kl-card>
